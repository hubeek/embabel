spring.application.name=embabel
blog-agent.output-dir=blog-posts
embabel.models.default-llm=claude-haiku-4-5
embabel.models.llms.reviewer=gpt-5.3-chat-latest
embabel.models.llms.hjh=gpt-5.3-chat-latest
embabel.agent.platform.ranking.llm=claude-haiku-4-5
embabel.agent.platform.models.anthropic.api-key=${ANTHROPIC_API_KEY}
embabel.agent.platform.models.openai.api-key=${OPENAI_API_KEY}

# Anthropic Claude configuration
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5
spring.ai.openai.base-url=https://api.openai.com
spring.ai.openai.api-key=${OPENAI_API_KEY}