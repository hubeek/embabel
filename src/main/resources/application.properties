spring.application.name=embabel
blog-agent.output-dir=blog-posts
embabel.models.default-llm=qwen3-vl-4b-instruct-mlx
embabel.models.llms.reviewer=qwen3-vl-4b-instruct-mlx
embabel.models.llms.hjh=gpt-5.3-chat-latest
embabel.agent.platform.ranking.llm=claude-haiku-4-5
embabel.agent.platform.models.anthropic.api-key=${ANTHROPIC_API_KEY}
